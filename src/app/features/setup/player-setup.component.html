<div class="page-shell">
  <div class="page-wrapper">

    <!-- Title -->
    <div class="title-row">
      <h2>Welcome to our guest "{{ username }}"</h2>
      <button (click)="editUsername()">Edit</button>
    </div>

    <!-- Players -->
    <div>
      <label>Please select players:</label>

      <div class="player-list">
        <label *ngFor="let player of players">
          <input type="checkbox" [checked]="isSelected(player)" (change)="togglePlayer(player)" />
          {{ player }}
        </label>
      </div>
    </div>

    <!-- Add player -->
    <div class="add-player">
      <input type="text" [(ngModel)]="newPlayer" placeholder="Enter Player Name" />
      <button (click)="addPlayer()">Add</button>
    </div>

    <!-- Selected players -->
    <div class="selected-box">
      <strong>Selected players</strong>

      <div *ngIf="selectedPlayers.length === 0" class="placeholder">
        No players selected
      </div>

      <div *ngFor="let p of selectedPlayers" class="player-chip">
        {{ p }}
        <button class="remove-btn" (click)="removePlayer(p)">X</button>
      </div>
    </div>

    <!-- Lose per head -->
    <div class="lose-row">
      <label>Please select lose per head:</label>
      <select [(ngModel)]="losePerHead">
        <option *ngFor="let val of loseOptions" [value]="val">
          {{ val }}
        </option>
      </select>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="back" (click)="goBack()">Back</button>
      <button class="continue" (click)="continue()">Continue</button>
    </div>

  </div>
</div>
