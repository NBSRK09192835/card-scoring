<div class="page-shell">
  <div class="page-wrapper">
    <h2>Welcome {{ username }}</h2>
    <p>Please enter/select player names:</p>

    <form [formGroup]="setupForm" (ngSubmit)="continue()" class="form">
      <div class="field-row">
        <cds-dropdown
          type="multi"
          formControlName="selectedPlayers"
          label="Player list (Select at least 1)"
          placeholder="Select players"
          [invalid]="setupForm.get('selectedPlayers')?.touched && setupForm.get('selectedPlayers')?.invalid"
          invalidText="Please select at least one player."
          helperText="Use the checkboxes to choose players or add a new one"
        >
          <cds-dropdown-list [items]="availablePlayers"></cds-dropdown-list>
        </cds-dropdown>
      </div>

      <div class="field-row add-player-row">
        <input type="text" formControlName="customPlayer" placeholder="New player name" />
        <button type="button" class="secondary" (click)="addCustomPlayer()">Add Player</button>
      </div>

      <fieldset class="loss-fieldset">
        <legend>Please select loss per head:</legend>
        <div class="radio-row" *ngFor="let value of [10, 20, 50, 100, 200, 300, 500]">
          <label>
            <input type="radio" [value]="value" formControlName="lossPerHead" />
            {{ value }}
          </label>
        </div>
      </fieldset>

      <div class="login-actions">
        <button type="button" class="secondary" (click)="backToHome()">Back</button>
        <button type="submit" class="primary continue">Continue</button>
      </div>
    </form>
  </div>
</div>
