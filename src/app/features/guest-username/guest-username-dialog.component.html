<h2>Enter Guest Username</h2>
<form [formGroup]="usernameForm" class="dialog-form" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="outline" class="username-field">
    <mat-label>Username</mat-label>
    <input matInput formControlName="username" autocomplete="off" />
    <mat-error *ngIf="usernameForm.get('username')?.hasError('required')">
      Username is required.
    </mat-error>
    <mat-error *ngIf="usernameForm.get('username')?.hasError('pattern')">
      Only letters, numbers, spaces, and &#64;#$ are allowed.
    </mat-error>
  </mat-form-field>

  <div class="dialog-actions">
    <button mat-button class="btn-secondary" (click)="onCancel()">Cancel</button>
    <button type="submit" mat-raised-button color="primary" [disabled]="usernameForm.invalid">Continue</button>
  </div>
</form>
