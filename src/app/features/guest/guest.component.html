<div class="page-shell">
  <div class="page-wrapper">
    <div class="message-container guest-message" *ngIf="message">
      <p class="message-text" [ngClass]="{ 'success': messageType === 'success', 'error': messageType !== 'success' }">{{ message }}</p>
    </div>
    <h2>Guest Login</h2>

  <form [formGroup]="guestForm" (ngSubmit)="startGuest()" class="form">
    <div class="field-row">
      <label>Guest Name</label>
      <input formControlName="username" placeholder="Enter guest name" />
    </div>

    <div class="login-actions">
      <button type="submit" class="primary">Enter as Guest</button>
      <a routerLink="/home" class="secondary">Back</a>
    </div>
  </form>

  <p><a routerLink="/home">Back to Home</a></p>
  </div>
</div>
