name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Cache NX and transpiled artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            ./node_modules
            ./.nx/cache
          key: ${{ runner.os }}-nx-${{ hashFiles('**/package-lock.json', '**/package.json', '**/nx.json', '**/tsconfig.base.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npx nx test nbs-card-scoring-frontend --runInBand

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Optional format check
        run: npm run format -- --check
        continue-on-error: true
